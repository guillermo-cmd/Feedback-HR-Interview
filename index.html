<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback de Entrevista - Humand</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    height: fit-content;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .logo span { color: #6c63ff; }
  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    color: #1a1a2e;
    background: #fafafa;
    transition: border 0.2s;
    font-family: inherit;
    resize: vertical;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #6c63ff;
    background: white;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  textarea.tall { min-height: 160px; }
  textarea.short { min-height: 100px; }
  .decision-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .decision-btn {
    flex: 1;
    min-width: 120px;
    padding: 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    background: #fafafa;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #666;
    transition: all 0.2s;
    text-align: center;
  }
  .decision-btn:hover { border-color: #6c63ff; color: #6c63ff; }
  .decision-btn.selected.avanzar { border-color: #22c55e; background: #f0fdf4; color: #16a34a; }
  .decision-btn.selected.no-avanzar { border-color: #ef4444; background: #fef2f2; color: #dc2626; }
  .decision-btn.selected.pendiente { border-color: #f59e0b; background: #fffbeb; color: #d97706; }
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: #6c63ff;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-submit:hover { background: #574fd6; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    text-align: center;
  }
  .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
  .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
  .status.loading { background: #f0f0ff; color: #6c63ff; border: 1px solid #ddd6fe; display: block; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Hum<span>and</span></div>
  <div class="subtitle">Carga de feedback de entrevista</div>

  <div class="row">
    <div class="field">
      <label>Nombre del candidato</label>
      <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
    </div>
    <div class="field">
      <label>Entrevistador/es</label>
      <input type="text" id="entrevistador" placeholder="Ej: María González" />
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Área</label>
      <input type="text" id="area" placeholder="Ej: Product, Tech, Sales..." />
    </div>
    <div class="field">
      <label>Rol para el que se entrevistó</label>
      <input type="text" id="rol" placeholder="Ej: Product Manager" />
    </div>
  </div>

  <hr class="divider">

  <div class="field">
    <label>Transcript de la entrevista</label>
    <textarea class="tall" id="transcript" placeholder="Pegá acá el transcript completo de Gemini..."></textarea>
  </div>

  <div class="field">
    <label>Notas del recruiter</label>
    <textarea class="short" id="notas" placeholder="Tus observaciones personales sobre el candidato..."></textarea>
  </div>

  <hr class="divider">

  <div class="field">
    <label>Decisión</label>
    <div class="decision-group">
      <div class="decision-btn avanzar" onclick="selectDecision(this, 'Avanzar')">✅ Avanzar</div>
      <div class="decision-btn no-avanzar" onclick="selectDecision(this, 'No avanzar')">❌ No avanzar</div>
      <div class="decision-btn pendiente" onclick="selectDecision(this, 'Pendiente')">⏳ Pendiente</div>
    </div>
    <input type="hidden" id="decision" />
  </div>

  <button class="btn-submit" onclick="enviar()">Generar feedback →</button>
  <div class="status" id="status"></div>
</div>

<script>
  const WEBHOOK = "https://hook.eu1.make.com/owj6trv3yysb6srmitx9rmrogicdwcl6";

  function selectDecision(el, val) {
    document.querySelectorAll('.decision-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('decision').value = val;
  }

  async function enviar() {
    const campos = {
      nombre: document.getElementById('nombre').value.trim(),
      entrevistador: document.getElementById('entrevistador').value.trim(),
      area: document.getElementById('area').value.trim(),
      rol: document.getElementById('rol').value.trim(),
      transcript: document.getElementById('transcript').value.trim(),
      notas: document.getElementById('notas').value.trim(),
      decision: document.getElementById('decision').value
    };

    const requeridos = ['nombre', 'area', 'rol', 'transcript', 'decision'];
    for (let campo of requeridos) {
      if (!campos[campo]) {
        mostrarStatus(`Por favor completá el campo: ${campo}`, 'error');
        return;
      }
    }

    const btn = document.querySelector('.btn-submit');
    btn.disabled = true;
    mostrarStatus('Enviando a Make...', 'loading');

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(campos)
      });
      if (res.ok) {
        mostrarStatus('✅ ¡Enviado! Claude está generando el feedback...', 'success');
        // Limpiar form
        document.querySelectorAll('input:not([type=hidden]), textarea').forEach(el => el.value = '');
        document.querySelectorAll('.decision-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('decision').value = '';
      } else {
        mostrarStatus('❌ Error al enviar. Código: ' + res.status, 'error');
      }
      btn.disabled = false;
    } catch (e) {
      mostrarStatus('❌ Error al enviar. Revisá tu conexión.', 'error');
      btn.disabled = false;
    }
  }

  function mostrarStatus(msg, tipo) {
    const el = document.getElementById('status');
    el.className = 'status ' + tipo;
    el.textContent = msg;
  }
</script>
</body>
</html>
